<!DOCTYPE html>
<html>
<head>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
   <style>
        
    
        h1, h2, h3,h4 ,h5 ,h6,p,a,b  {
            font-family: serif;
            font-optical-sizing: auto;
            font-style: normal;
            color:#f0f8ffcb;
        }
        nav {
            text-align:center;
            background-color: #000000e1;
            box-shadow: 0px 0px 5px 2px #8f8f8f;
            border: #f0f8ff solid 1px;
            border-radius:25px 25px 0px 0px;
        }
        body{
            background-image: url("https://raw.githubusercontent.com/love-cherry-roman/Nest/81cf17e1ff7b19ef63d5443dccd129af36cb54d5/Untitled79_20260519201942.png");
            background-repeat:repeat;
            background-size:25%;
        }
        .divdiv{
            background-color:#000000;
        }
        .divvydiv{
          width:1000px;
          position: absolute;
          left: 50%;
          transform: translate(-50%, 0%);
        }

    .gradient{
        height:3px;
        margin-top:15px;
        margin-bottom:15px;
        border-radius:7px;
        border-style: solid;
        background: linear-gradient(
            90deg,
            #000000 0%,
            #444444 25%,
            #888888 50%,
            #b4b4b4 75%,
            #ffffff 100%
        );
        border-color: linear-gradient(
            90deg,
            #000000 100%,
            #444444 75%,
            #888888 50%,
            #cccccc 25%,
            #ffffff 0%
        );
    }
    nav > h1{
        letter-spacing:10px !important;
        word-spacing: 10px;
        font-family: "Cinzel Decorative", serif;
    }
    nav > h1 > .he{
        letter-spacing:27px;
    }

        .innerDiv {
            background-color: #000000e1;
            box-shadow: 0px 0px 5px 2px #8f8f8f;
            border: #f0f8ff solid 1px;
            border-radius:0px 0px 25px 25px;
            width:100%;
            display:table;
            table-layout: fixed;
            box-sizing: content-box;
        }
        .col{
            display: table-cell;
            vertical-align: top;
        }

        .col.w-40{
            width:40%;
        }
        .pfp{
            margin:25px;
        }

        .pfp > .photo
        {
            width:200px;
            border: #f0f8ff solid 4px;
            border-radius: 5px;
        }
        
    </style>
    <meta charset="UTF-8" />
    <title>title</title>
</head>
<body>
    <div class = "divdiv">
        <div class = "maindiv">
            <div class="divvydiv">
                <nav>
                
            <h1>Love C<span class = "he">he</span>rry Roman</h1>
                </nav>
                <hr class = gradient>
                <div class = "innerDiv">
                    <div class="col w-40 left">
                        <div class="pfp">
                            <img class="photo" src="https://cdn.discordapp.com/avatars/832344471555276870/5f2dd956f4aa3b3b6c23b46e1c8dddf2.webp?size=1024">
                        
                        <h2>Mood: hiiiiiiiiii</h2>
                        </div>
                    </div>
                    <div class="col right">
                        <h1>Work in Progress...</h1>
                        <progress style="width:300px;"></progress>
                    </div>

                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
